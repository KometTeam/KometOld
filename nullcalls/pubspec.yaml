name: maxcalls_dart
description: A Dart package for MAX messenger call API integration using TCP sockets. Designed for Komet Client.
version: 0.2.0
homepage: https://github.com/TeamKomet/maxcalls_dart

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  # MessagePack serialization
  msgpack_dart: ^1.0.1
  
  # LZ4 compression
  es_compression: ^2.0.7
  
  # HTTP client
  http: ^1.1.0
  
  # UUID generation
  uuid: ^4.0.0
  
  # Logging
  logging: ^1.2.0
  
  # WebRTC for media streams
  flutter_webrtc: ^1.3.0
  
  # WebSocket for signaling
  web_socket_channel: ^2.4.0

dev_dependencies:
  lints: ^3.0.0
  test: ^1.24.0
